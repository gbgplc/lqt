name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe what you'd like to see.
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      description: "Which interface does this apply to?"
      options:
        - CLI (lqt verify / lqt parse)
        - MCP server (stdio)
        - MCP server (HTTP)
        - Demo (lqt demo)
        - All / not specific
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: "What problem does this solve, or what use case does it enable?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "How would you like this to work?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Any workarounds or alternatives you've tried?"
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: "Anything else (examples, screenshots, links to related issues, etc.)"
