name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas. Please describe the feature you'd like to see.
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      description: "Which interface is this for?"
      options:
        - CLI
        - MCP server
        - Demo
        - All / not specific
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: "What problem does this solve? What are you trying to do?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "How would you like this to work? (flags, behavior, output format, etc.)"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Any workarounds or alternative approaches you've tried"
