name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the details below to help us investigate.
  - type: input
    id: version
    attributes:
      label: lqt version
      description: "Run `lqt --version` and paste the output"
      placeholder: "v0.6.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (ARM64)
        - Windows (x86_64)
    validations:
      required: true
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      description: "Which interface were you using?"
      options:
        - CLI (lqt verify / lqt parse)
        - MCP server (stdio)
        - MCP server (HTTP)
        - Demo (lqt demo)
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command / request
      description: "The command you ran or the MCP tool call. **Redact any API keys.**"
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What you expected to happen"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: "What actually happened (include error messages if any)"
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: "Anything else that might help (logs, screenshots, policy file, etc.)"
